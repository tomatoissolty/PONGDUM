<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONGDUM - 아이디어 덤핑</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --accent-color: #A5A6F6; /* 이미지 스타일의 파스텔 퍼플/블루 */
            --bg-color: #F8F9FB;
            --card-bg: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            --border-light: #E8E8ED;
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1C1C1E;
            --text-primary: #F5F5F7;
            --text-secondary: #98989D;
            --shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            --border-light: #38383A;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
            transition: background 0.5s ease;
        }

        /* 1. 헤더: 중앙 타이틀 + 픽토그램 */
        .header {
            padding: 30px 24px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .header .logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .header-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .header-btn:active { transform: scale(0.9); }
        .header-btn svg { width: 22px; height: 22px; }

        /* 검색창 애니메이션 */
        .search-container {
            position: absolute;
            top: 80px;
            left: 24px;
            right: 24px;
            transform: translateY(-20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }
        .search-container.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }
        .search-input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            background: var(--card-bg);
            box-shadow: var(--shadow);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }

        /* 카드 데크 공간 */
        .deck-container {
            position: relative;
            height: 460px;
            margin: 20px auto 0;
            max-width: 400px;
            perspective: 1000px;
        }
        .card-deck {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 카드 디자인: 0.8배 높이 & 쫀득한 모션 */
        .card {
            position: absolute;
            width: 310px;
            height: 380px;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: grab;
            touch-action: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card.center { z-index: 5; transform: translateZ(0); opacity: 1; }
        .card.left-1 { z-index: 4; transform: translateX(-110%) rotateY(15deg) scale(0.85); opacity: 0.4; pointer-events: none; }
        .card.right-1 { z-index: 4; transform: translateX(110%) rotateY(-15deg) scale(0.85); opacity: 0.4; pointer-events: none; }

        /* 카드 요소: 픽토그램 & 인디케이터 */
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .card-indicators { display: flex; align-items: center; gap: 8px; }
        .folder-dot { width: 10px; height: 10px; border-radius: 50%; display: none; }
        .star-icon { color: #FFD60A; display: none; }
        .card.has-folder .folder-dot { display: block; }
        .card.is-fav .star-icon { display: block; }
        
        .edit-trigger { color: var(--border-light); cursor: pointer; transition: color 0.2s; }
        .edit-trigger:hover { color: var(--accent-color); }

        .card-content {
            font-size: 16px;
            line-height: 1.7;
            color: var(--text-primary);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 500;
        }

        .card-time { font-size: 11px; color: var(--text-secondary); text-align: right; margin-top: 10px; opacity: 0.5; }

        /* 카드 카운터: 가리지 않게 하단으로 이동 */
        .card-counter {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 하단 폴더 섹션: 햄버거 메뉴 + 칩 */
        .folder-section {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }
        .hamburger-btn {
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            border: none;
            border-radius: 18px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .folder-slider {
            flex: 1;
            overflow-x: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 5px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .folder-slider::-webkit-scrollbar { display: none; }
        .folder-chip {
            padding: 12px 20px;
            background: var(--card-bg);
            border-radius: 18px;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .folder-chip.active {
            background: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* 토스트: 글래스모피즘 + 픽토그램 */
        .fav-toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100px; height: 100px; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .fav-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .fav-toast svg { width: 45px; height: 45px; color: #FFD60A; }

        /* 알림 토스트 */
        .toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8); color: white; padding: 14px 28px;
            border-radius: 20px; font-size: 14px; z-index: 2000; opacity: 0; transition: all 0.4s;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 모달 스타일 */
        .modal { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-radius: 35px 35px 0 0; padding: 40px 30px; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 500; }
        .modal.show { transform: translateY(0); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 400; }
        .modal-overlay.show { opacity: 1; pointer-events: all; }

        .btn-main { width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 700; cursor: pointer; background: var(--accent-color); color: white; margin-top: 20px; font-size: 16px; transition: opacity 0.2s; }
        .btn-main:active { opacity: 0.8; }

        /* 스낵바 */
        .undo-bar {
            position: fixed; bottom: 120px; left: 24px; right: 24px;
            background: #2C2C2E; color: white; padding: 16px 24px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 4000; transform: translateY(100px); opacity: 0; transition: all 0.4s;
        }
        .undo-bar.show { transform: translateY(0); opacity: 1; }
        .undo-btn { color: var(--accent-color); font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <button class="header-btn" onclick="toggleSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <div class="logo" onclick="location.reload()">PONGDUM</div>
        <button class="header-btn" onclick="openSettings()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
        </button>
        
        <div class="search-container" id="searchBar">
            <input type="text" class="search-input" placeholder="무엇을 찾으시나요?" oninput="onSearch(this.value)">
        </div>
    </header>

    <main class="deck-container">
        <div class="card-deck" id="cardDeck"></div>
        <div class="card-counter" id="cardCounter">01 / 00</div>
    </main>

    <div class="fav-toast" id="favToast">
        </div>

    <div class="toast" id="toast"></div>

    <div class="undo-bar" id="undoBar">
        <span>삭제되었습니다.</span>
        <span class="undo-btn" onclick="undoDelete()">복구하기</span>
    </div>

    <div class="folder-section">
        <button class="hamburger-btn" onclick="openMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="folder-slider" id="folderSlider">
            </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
    
    <div class="modal" id="menuModal">
        <h3 style="margin-bottom: 20px;">폴더 관리</h3>
        <div id="folderList"></div>
        <button class="btn-main" onclick="addNewFolder()">+ 새 폴더 추가</button>
        <div class="folder-palette" id="folderPalette" style="display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:20px;"></div>
    </div>

    <div class="modal" id="settingsModal">
        <h3 style="margin-bottom: 20px;">설정</h3>
        <div class="color-palette" id="colorPalette" style="display:grid; grid-template-columns:repeat(10,1fr); gap:8px; margin-bottom:30px;"></div>
        <button onclick="toggleDarkMode()" class="btn-main" style="background:var(--bg-color); color:var(--text-primary); border:1px solid var(--border-light);">테마 전환</button>
        <button onclick="exportAsText()" class="btn-main">텍스트로 저장하기</button>
        <button onclick="exportData()" class="btn-main" style="background:none; color:var(--text-secondary);">데이터 백업 (JSON)</button>
        <button onclick="importData()" class="btn-main" style="background:none; color:var(--text-secondary); margin-top:0;">데이터 복구</button>
        <input type="file" id="importFile" accept=".json" style="display: none;" onchange="handleImport(event)">
    </div>

    <script>
        let ideas = [];
        let folders = [
            { id: 'all', name: '전체', color: '#A5A6F6', locked: true },
            { id: 'favorites', name: '즐겨찾기', color: '#FFD60A', locked: true },
            { id: 'uncategorized', name: '미분류', color: '#8E8E93', locked: false }
        ];
        let currentIndex = 0, currentFolder = 'all', sortOrder = 'newest', searchTerm = "";
        let isDragging = false, startX, startY, currentX = 0, currentY = 0;
        let lastDeletedIdea = null, undoTimeout = null, selectedFolderToEdit = null;

        const colors = ['#FFB3BA', '#BAFFC9', '#BAE1FF', '#FFFFBA', '#E0BBE4', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'];

        // 픽토그램 정의
        const iconStarFilled = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        const iconStarOutline = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        const iconEdit = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;

        function init() {
            loadData();
            renderFolderSlider();
            renderCards();
            updateCounter();
            setupLogoDrag();
            renderColorPalettes();
        }

        function loadData() {
            ideas = JSON.parse(localStorage.getItem('pongdum_ideas') || '[]');
            const savedFolders = localStorage.getItem('pongdum_folders');
            if (savedFolders) folders = JSON.parse(savedFolders);
            if (localStorage.getItem('pongdum_dark') === 'true') document.body.classList.add('dark-mode');
            const accent = localStorage.getItem('pongdum_accent') || '#A5A6F6';
            document.documentElement.style.setProperty('--accent-color', accent);
        }

        function saveData() {
            localStorage.setItem('pongdum_ideas', JSON.stringify(ideas));
            localStorage.setItem('pongdum_folders', JSON.stringify(folders));
            localStorage.setItem('pongdum_accent', document.documentElement.style.getPropertyValue('--accent-color'));
            localStorage.setItem('pongdum_dark', document.body.classList.contains('dark-mode'));
        }

        /* 메인 렌더러 */
        function renderCards() {
            const deck = document.getElementById('cardDeck');
            const filtered = getFilteredIdeas();
            deck.innerHTML = filtered.length === 0 ? `<div style="color:var(--text-secondary); text-align:center; padding:20px;">텅 비어있네요.<br>상단 로고를 끌어당겨보세요!</div>` : '';
            
            for (let i = -1; i <= 1; i++) {
                const idx = currentIndex + i;
                if (idx >= 0 && idx < filtered.length) {
                    deck.appendChild(createCard(filtered[idx], i));
                }
            }
            updateCounter();
        }

        function createCard(idea, offset) {
            const card = document.createElement('div');
            card.className = `card ${offset === 0 ? 'center' : (offset < 0 ? 'left-1' : 'right-1')}`;
            if (idea.folder !== 'uncategorized') card.classList.add('has-folder');
            if (idea.favorite) card.classList.add('is-fav');

            const f = folders.find(f => f.id === idea.folder);
            const dotColor = f ? f.color : '#8E8E93';
            const date = new Date(idea.createdAt);
            const timeStr = `${date.getMonth()+1}월 ${date.getDate()}일`;

            card.innerHTML = `
                <div class="card-top">
                    <div class="card-indicators">
                        <div class="folder-dot" style="background:${dotColor}"></div>
                        <div class="star-icon" style="width:18px; height:18px;">${iconStarFilled}</div>
                    </div>
                    <div class="edit-trigger" style="width:20px; height:20px;" onclick="event.stopPropagation(); startEdit(${idea.id});">
                        ${iconEdit}
                    </div>
                </div>
                <div class="card-content">${idea.content}</div>
                <div class="card-time">${timeStr}</div>
            `;

            if (offset === 0) {
                card.onmousedown = card.ontouchstart = e => {
                    if (e.target.closest('.edit-trigger')) return;
                    startDrag(e, card, idea);
                };
            }
            return card;
        }

        function renderFolderSlider() {
            const slider = document.getElementById('folderSlider');
            slider.innerHTML = folders.map(f => `
                <div class="folder-chip ${currentFolder === f.id ? 'active' : ''}" onclick="selectFolder('${f.id}')">
                    <span style="width:8px; height:8px; border-radius:50%; background:${f.color}; border:1px solid rgba(0,0,0,0.1)"></span>
                    ${f.name}
                </div>
            `).join('');
        }

        /* 로직 컨트롤 */
        function startDrag(e, card, idea) {
            isDragging = true;
            let dragTime = Date.now();
            const pt = e.touches ? e.touches[0] : e;
            startX = pt.clientX; startY = pt.clientY;
            
            document.onmousemove = document.ontouchmove = me => {
                const mpt = me.touches ? me.touches[0] : me;
                currentX = mpt.clientX - startX;
                currentY = mpt.clientY - startY;
                
                // 센터 카드만 움직임
                card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.05}deg)`;
                
                const t = document.getElementById('toast');
                if (Math.abs(currentY) > 80) {
                    t.textContent = currentY < 0 ? '🗑️ 위로 던져 삭제' : '💾 아래로 당겨 저장';
                    t.classList.add('show');
                } else t.classList.remove('show');
            };

            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = null;
                document.getElementById('toast').classList.remove('show');
                
                const duration = Date.now() - dragTime;
                if (duration < 200 && Math.abs(currentX) < 10 && Math.abs(currentY) < 10) {
                    toggleFavorite(idea);
                } else {
                    if (Math.abs(currentX) > 120) navigateCard(currentX > 0 ? -1 : 1);
                    else if (currentY < -100) deleteIdea(idea);
                    else if (currentY > 100) saveToFolder(idea);
                }
                card.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                card.style.transform = '';
                setTimeout(() => card.style.transition = '', 500);
                isDragging = false; currentX = 0; currentY = 0;
            };
        }

        function toggleFavorite(idea) {
            idea.favorite = !idea.favorite;
            const favToast = document.getElementById('favToast');
            favToast.innerHTML = idea.favorite ? iconStarFilled : iconStarOutline;
            favToast.classList.add('show');
            setTimeout(() => favToast.classList.remove('show'), 800);
            saveData(); renderCards();
        }

        function navigateCard(d) {
            const f = getFilteredIdeas();
            const n = currentIndex + d;
            if (n >= 0 && n < f.length) { 
                currentIndex = n; 
                renderCards(); 
            }
        }

        function deleteIdea(idea) {
            lastDeletedIdea = { ...idea, originalIdx: ideas.findIndex(i => i.id === idea.id) };
            ideas = ideas.filter(i => i.id !== idea.id);
            saveData(); renderCards();
            const bar = document.getElementById('undoBar');
            bar.classList.add('show');
            if (undoTimeout) clearTimeout(undoTimeout);
            undoTimeout = setTimeout(() => bar.classList.remove('show'), 5000);
        }

        function undoDelete() {
            if (lastDeletedIdea) {
                ideas.splice(lastDeletedIdea.originalIdx, 0, lastDeletedIdea);
                lastDeletedIdea = null;
                document.getElementById('undoBar').classList.remove('show');
                saveData(); renderCards();
            }
        }

        function saveToFolder(idea) {
            if (currentFolder === 'all' || currentFolder === 'favorites') {
                showToast('먼저 저장할 폴더 칩을 선택하세요.');
                return;
            }
            idea.folder = currentFolder;
            saveData(); renderCards();
            showToast(`"${folders.find(f => f.id === currentFolder).name}"에 덤핑 완료!`);
        }

        function startEdit(id) {
            const idea = ideas.find(i => i.id === id);
            const deck = document.getElementById('cardDeck');
            deck.innerHTML = `
                <div class="card center editing" style="transform: scale(1.05);">
                    <textarea id="editArea" style="width:100%; height:100%; border:none; background:transparent; font-size:16px; font-family:inherit; text-align:center; outline:none; resize:none;">${idea.content}</textarea>
                    <button class="btn-main" onclick="finishEdit(${id})">완료</button>
                    <button onclick="renderCards()" style="background:none; border:none; margin-top:10px; color:var(--text-secondary); cursor:pointer;">취소</button>
                </div>`;
            document.getElementById('editArea').focus();
        }

        function finishEdit(id) {
            const val = document.getElementById('editArea').value.trim();
            if (val) {
                ideas.find(i => i.id === id).content = val;
                saveData(); renderCards();
                showToast('수정되었습니다.');
            }
        }

        /* 유틸리티 */
        function selectFolder(id) {
            currentFolder = id; currentIndex = 0;
            renderFolderSlider(); renderCards();
        }

        function updateCounter() {
            const f = getFilteredIdeas();
            const current = f.length > 0 ? currentIndex + 1 : 0;
            document.getElementById('cardCounter').textContent = 
                `${current.toString().padStart(2, '0')} / ${f.length.toString().padStart(2, '0')}`;
        }

        function setupLogoDrag() {
            const logo = document.querySelector('.logo');
            logo.draggable = true;
            logo.addEventListener('dragend', () => {
                const n = { id: Date.now(), content: '', folder: 'uncategorized', favorite: false, createdAt: new Date().toISOString() };
                ideas.unshift(n); currentIndex = 0; saveData(); renderCards(); startEdit(n.id);
            });
            // 모바일용 롱프레스 대응
            let pressTimer;
            logo.addEventListener('touchstart', () => pressTimer = setTimeout(() => {
                logo.dispatchEvent(new Event('dragend'));
            }, 600));
            logo.addEventListener('touchend', () => clearTimeout(pressTimer));
        }

        function toggleSearch() { document.getElementById('searchBar').classList.toggle('show'); }
        function onSearch(val) { searchTerm = val; currentIndex = 0; renderCards(); }
        
        function openMenu() { renderFolderList(); document.getElementById('overlay').classList.add('show'); document.getElementById('menuModal').classList.add('show'); }
        function openSettings() { document.getElementById('overlay').classList.add('show'); document.getElementById('settingsModal').classList.add('show'); }
        function closeAllModals() { document.querySelectorAll('.modal, .modal-overlay').forEach(el => el.classList.remove('show')); }

        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

        function renderFolderList() {
            document.getElementById('folderList').innerHTML = folders.filter(f => !f.locked).map(f => `
                <div style="display:flex; align-items:center; gap:10px; padding:15px; background:var(--bg-color); border-radius:15px; margin-bottom:10px;">
                    <div style="width:15px; height:15px; border-radius:50%; background:${f.color}"></div>
                    <input type="text" value="${f.name}" onchange="updateFolderName('${f.id}', this.value)" style="flex:1; border:none; background:none; outline:none; font-size:16px;">
                    <button onclick="deleteFolder('${f.id}')" style="border:none; background:none; color:red; cursor:pointer;">삭제</button>
                </div>
            `).join('');
        }

        function updateFolderName(id, name) { folders.find(f => f.id === id).name = name; saveData(); renderFolderSlider(); }
        function addNewFolder() { folders.push({ id: 'f'+Date.now(), name: '새 폴더', color: colors[0], locked: false }); saveData(); renderFolderList(); renderFolderSlider(); }
        function deleteFolder(id) { if(confirm('폴더를 삭제할까요?')) { folders = folders.filter(f => f.id !== id); saveData(); renderFolderList(); renderFolderSlider(); } }

        function renderColorPalettes() {
            const accP = document.getElementById('colorPalette');
            accP.innerHTML = colors.map(c => `<div onclick="setAccent('${c}')" style="background:${c}; aspect-ratio:1; border-radius:5px; cursor:pointer;"></div>`).join('');
        }
        function setAccent(c) { document.documentElement.style.setProperty('--accent-color', c); localStorage.setItem('pongdum_accent', c); saveData(); renderFolderSlider(); }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('pongdum_dark', document.body.classList.contains('dark-mode')); }

        function getFilteredIdeas() {
            let list = ideas;
            if (currentFolder === 'favorites') list = ideas.filter(i => i.favorite);
            else if (currentFolder !== 'all') list = ideas.filter(i => i.folder === currentFolder);
            if (searchTerm) list = list.filter(i => i.content.toLowerCase().includes(searchTerm.toLowerCase()));
            return list;
        }

        // 텍스트 내보내기 등 나머지 기능은 이전과 동일하게 유지...
        function exportAsText() {
            let text = ideas.map(i => `[${folders.find(f=>f.id===i.folder)?.name || '미분류'}] ${i.content}`).join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'PONGDUM_Ideas.txt'; a.click();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({ideas, folders})], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'PONGDUM_Backup.json'; a.click();
        }

        function importData() { document.getElementById('importFile').click(); }
        function handleImport(e) {
            const reader = new FileReader();
            reader.onload = ev => {
                const d = JSON.parse(ev.target.result);
                ideas = d.ideas; folders = d.folders; saveData(); location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        init();
    </script>
</body>
</html>
