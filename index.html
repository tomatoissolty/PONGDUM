<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONGDUM - 아이디어 덤핑</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --accent-color: #A5A6F6;
            --bg-color: #F8F9FB;
            --card-bg: #FFFFFF;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            --border-light: #E8E8ED;
        }

        body.dark-mode {
            --bg-color: #121212;
            --card-bg: #1C1C1E;
            --text-primary: #F5F5F7;
            --text-secondary: #98989D;
            --shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            --border-light: #38383A;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
            transition: background 0.5s ease;
        }

        /* 헤더 */
        .header { padding: 30px 24px 10px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .header .logo { position: absolute; left: 50%; transform: translateX(-50%); font-size: 22px; font-weight: 700; color: var(--text-primary); cursor: pointer; }
        .header-btn { width: 44px; height: 44px; border: none; background: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; }
        .header-btn svg { width: 22px; height: 22px; }

        .search-container { position: absolute; top: 80px; left: 24px; right: 24px; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 100; }
        .search-container.show { opacity: 1; pointer-events: all; transform: translateY(10px); }
        .search-input { width: 100%; padding: 16px 24px; border-radius: 20px; border: 1px solid var(--border-light); background: var(--card-bg); box-shadow: var(--shadow); outline: none; }

        /* 카드 데크 */
        .deck-container { position: relative; height: 460px; margin: 20px auto 0; max-width: 400px; perspective: 1000px; }
        .card {
            position: absolute; width: 310px; height: 380px; background: var(--card-bg); border-radius: 32px; box-shadow: var(--shadow);
            padding: 40px 30px; display: flex; flex-direction: column; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); cursor: grab; touch-action: none;
        }
        .card.center { z-index: 5; transform: translateZ(0); opacity: 1; }
        .card.left-1 { z-index: 4; transform: translateX(-110%) scale(0.85); opacity: 0.2; filter: blur(4px); }
        .card.right-1 { z-index: 4; transform: translateX(110%) scale(0.85); opacity: 0.2; filter: blur(4px); }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .card-indicators { display: flex; align-items: center; gap: 8px; }
        .folder-dot { width: 10px; height: 10px; border-radius: 50%; }
        .star-icon { color: #FFD60A; display: none; width: 18px; }
        .card.is-fav .star-icon { display: block; }
        .edit-trigger { color: var(--border-light); cursor: pointer; width: 20px; }

        .card-content { font-size: 16px; line-height: 1.7; flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 500; }
        .card-time { font-size: 11px; color: var(--text-secondary); text-align: right; margin-top: 10px; opacity: 0.5; }
        .card-counter { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); font-size: 14px; color: var(--text-secondary); font-weight: 600; }

        /* 하단 폴더 섹션 */
        .folder-section { position: fixed; bottom: 40px; left: 0; right: 0; display: flex; align-items: center; padding: 0 24px; gap: 10px; max-width: 500px; margin: 0 auto; }
        
        /* 폴더 슬라이더 (카드와 같은 스와이프 방식) */
        .folder-slider-wrap { flex: 1; height: 60px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .folder-deck { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .folder-chip {
            position: absolute; padding: 12px 20px; background: var(--card-bg); border-radius: 18px; 
            font-size: 14px; font-weight: 700; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap; cursor: pointer;
        }
        .folder-chip.center { z-index: 5; background: var(--accent-color); color: white; opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
        .folder-chip.side { z-index: 4; opacity: 0.4; filter: blur(2px); }
        .folder-chip.left-1 { transform: translateX(-120px) scale(0.8); }
        .folder-chip.right-1 { transform: translateX(120px) scale(0.8); }
        .folder-chip.hidden { opacity: 0; pointer-events: none; }

        .f-btn { width: 50px; height: 50px; background: var(--card-bg); border: none; border-radius: 18px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; color: var(--text-secondary); transition: 0.3s; }
        .f-btn.active { background: var(--accent-color); color: white; }

        /* 별 토스트 */
        .fav-toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(255,255,255,0.7); backdrop-filter: blur(15px); width: 100px; height: 100px; border-radius: 30px; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 3000; }
        .fav-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .fav-toast svg { width: 45px; height: 45px; color: #FFD60A; }

        /* 알림 토스트 */
        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(0,0,0,0.8); color: white; padding: 14px 28px; border-radius: 20px; font-size: 14px; z-index: 2000; opacity: 0; transition: 0.4s; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 팔레트 */
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .color-dot { height: 35px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.selected { border-color: var(--text-primary); }

        /* 모달 */
        .modal { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); border-radius: 35px 35px 0 0; padding: 40px 30px; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 500; }
        .modal.show { transform: translateY(0); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(5px); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 400; }
        .modal-overlay.show { opacity: 1; pointer-events: all; }

        .undo-bar { position: fixed; bottom: 120px; left: 24px; right: 24px; background: #2C2C2E; color: white; padding: 16px 24px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; z-index: 4000; transform: translateY(100px); opacity: 0; transition: 0.4s; }
        .undo-bar.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header class="header">
        <button class="header-btn" onclick="toggleSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
        <div class="logo" id="mainLogo">PONGDUM</div>
        <button class="header-btn" onclick="openSettings()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
        </button>
        <div class="search-container" id="searchBar"><input type="text" class="search-input" placeholder="검색..." oninput="onSearch(this.value)"></div>
    </header>

    <main class="deck-container">
        <div class="card-deck" id="cardDeck"></div>
        <div class="card-counter" id="cardCounter">00 / 00</div>
    </main>

    <div class="fav-toast" id="favToast"></div>
    <div class="toast" id="toast"></div>
    <div class="undo-bar" id="undoBar"><span>삭제되었습니다.</span><span onclick="undoDelete()" style="color:var(--accent-color); font-weight:700; cursor:pointer;">복구</span></div>

    <div class="folder-section">
        <button class="f-btn" onclick="openMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        
        <div class="folder-slider-wrap" id="folderSliderWrap">
            <div class="folder-deck" id="folderDeck"></div>
        </div>

        <button class="f-btn" id="storeModeBtn" onclick="toggleStoreMode()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><line x1="12" y1="11" x2="12" y2="17"></line><line x1="9" y1="14" x2="15" y2="14"></line></svg>
        </button>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
    
    <div class="modal" id="menuModal">
        <h3 style="margin-bottom:20px;">폴더 편집</h3>
        <div id="folderList"></div>
        <button onclick="addNewFolder()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--bg-color); font-weight:700; margin-top:10px;">+ 새 폴더</button>
        <div id="folderPalette" class="palette-grid"></div>
    </div>

    <div class="modal" id="settingsModal">
        <h3 style="margin-bottom:20px;">테마 및 데이터</h3>
        <div id="colorPalette" class="palette-grid" style="margin-bottom:30px;"></div>
        <button onclick="toggleDarkMode()" style="width:100%; padding:15px; border-radius:15px; border:1px solid var(--border-light); background:none; font-weight:700;">다크모드 전환</button>
        <button onclick="exportAsText()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--accent-color); color:white; font-weight:700; margin-top:10px;">텍스트로 저장</button>
        <button onclick="exportData()" style="width:100%; padding:10px; border:none; background:none; color:var(--text-secondary); margin-top:20px;">동기화 데이터 내보내기</button>
        <button onclick="importData()" style="width:100%; padding:10px; border:none; background:none; color:var(--text-secondary);">동기화 데이터 가져오기</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImport(event)">
    </div>

    <script>
        let ideas = [];
        let folders = [
            { id: 'all', name: '전체', color: '#A5A6F6', locked: true },
            { id: 'favorites', name: '즐겨찾기', color: '#FFD60A', locked: true },
            { id: 'uncategorized', name: '미분류', color: '#8E8E93', locked: false }
        ];
        let currentIndex = 0, currentFolderIdx = 0, isStoreMode = false;
        let isDragging = false, startX, startY, currentX = 0, currentY = 0, dragTime;
        let searchTerm = "", selectedFolderToEdit = null, lastDeletedIdea = null;

        const vividColors = ['#FF3B30', '#FF9500', '#34C759', '#007AFF', '#AF52DE'];
        const pastelColors = ['#FFB3BA', '#BAFFC9', '#BAE1FF', '#FFFFBA', '#E0BBE4'];
        const allColors = [...vividColors, ...pastelColors];

        const icons = {
            starF: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`,
            starO: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`,
            edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`
        };

        function init() {
            loadData();
            renderFolders();
            renderCards();
            renderPalettes();
            setupLogoDrag();
        }

        function loadData() {
            ideas = JSON.parse(localStorage.getItem('pongdum_ideas') || '[]');
            const savedF = localStorage.getItem('pongdum_folders');
            if (savedF) folders = JSON.parse(savedF);
            if (localStorage.getItem('pongdum_dark') === 'true') document.body.classList.add('dark-mode');
            const acc = localStorage.getItem('pongdum_accent') || '#A5A6F6';
            document.documentElement.style.setProperty('--accent-color', acc);
        }

        function saveData() {
            localStorage.setItem('pongdum_ideas', JSON.stringify(ideas));
            localStorage.setItem('pongdum_folders', JSON.stringify(folders));
            localStorage.setItem('pongdum_dark', document.body.classList.contains('dark-mode'));
            localStorage.setItem('pongdum_accent', document.documentElement.style.getPropertyValue('--accent-color'));
        }

        /* 카드 렌더링 */
        function renderCards() {
            const deck = document.getElementById('cardDeck');
            const filtered = getFilteredIdeas();
            deck.innerHTML = filtered.length === 0 ? `<div style="color:var(--text-secondary); text-align:center;">${isStoreMode ? '정리할 미분류 카드가 없습니다.' : '카드가 없습니다.'}</div>` : '';
            
            for (let i = -1; i <= 1; i++) {
                const idx = currentIndex + i;
                if (idx >= 0 && idx < filtered.length) {
                    deck.appendChild(createCard(filtered[idx], i));
                }
            }
            updateCounter();
        }

        function createCard(idea, offset) {
            const card = document.createElement('div');
            card.className = `card ${offset === 0 ? 'center' : (offset < 0 ? 'left-1' : 'right-1')}`;
            if (idea.favorite) card.classList.add('is-fav');
            
            const f = folders.find(f => f.id === idea.folder);
            const dotColor = f ? f.color : '#8E8E93';
            const date = new Date(idea.createdAt);

            card.innerHTML = `
                <div class="card-top">
                    <div class="card-indicators">
                        <div class="folder-dot" style="background:${dotColor}; display:${idea.folder==='uncategorized'?'none':'block'}"></div>
                        <div class="star-icon">${icons.starF}</div>
                    </div>
                    <div class="edit-trigger" onclick="event.stopPropagation(); startEdit(${idea.id});">${icons.edit}</div>
                </div>
                <div class="card-content">${idea.content}</div>
                <div class="card-time">${date.getMonth()+1}월 ${date.getDate()}일</div>
            `;

            if (offset === 0) {
                card.onmousedown = card.ontouchstart = e => startDrag(e, card, idea);
            }
            return card;
        }

        /* 폴더 렌더링 (스와이프 방식) */
        function renderFolders() {
            const deck = document.getElementById('folderDeck');
            deck.innerHTML = '';
            for (let i = -1; i <= 1; i++) {
                const idx = currentFolderIdx + i;
                if (idx >= 0 && idx < folders.length) {
                    const f = folders[idx];
                    const chip = document.createElement('div');
                    chip.className = `folder-chip ${i === 0 ? 'center' : 'side'} ${i < 0 ? 'left-1' : (i > 0 ? 'right-1' : '')}`;
                    chip.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${f.color}"></span>${f.name}`;
                    if (i === 0) chip.onmousedown = chip.ontouchstart = e => startFolderDrag(e, chip);
                    deck.appendChild(chip);
                }
            }
        }

        /* 드래그 로직 (카드) */
        function startDrag(e, card, idea) {
            isDragging = true; dragTime = Date.now();
            const pt = e.touches ? e.touches[0] : e;
            startX = pt.clientX; startY = pt.clientY;
            
            document.onmousemove = document.ontouchmove = me => {
                const mpt = me.touches ? me.touches[0] : me;
                currentX = mpt.clientX - startX; currentY = mpt.clientY - startY;
                card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.03}deg)`;
                
                const t = document.getElementById('toast');
                if (Math.abs(currentY) > 80) {
                    t.textContent = currentY < 0 ? '🗑️ 던져서 삭제' : (isStoreMode ? `💾 ${folders[currentFolderIdx].name} 폴더에 저장` : '💾 당겨서 저장');
                    t.classList.add('show');
                } else t.classList.remove('show');
            };

            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = null;
                document.getElementById('toast').classList.remove('show');
                const duration = Date.now() - dragTime;

                if (duration < 200 && Math.abs(currentX) < 5 && Math.abs(currentY) < 5) {
                    toggleFavorite(idea);
                } else {
                    if (Math.abs(currentX) > 100) navigateCard(currentX > 0 ? -1 : 1);
                    else if (currentY < -100) deleteIdea(idea);
                    else if (currentY > 100) {
                        if (isStoreMode) saveToFolderInStoreMode(idea);
                        else saveToFolder(idea);
                    }
                }
                card.style.transition = '0.5s'; card.style.transform = '';
                setTimeout(() => card.style.transition = '', 500);
                isDragging = false; currentX = 0; currentY = 0;
            };
        }

        /* 폴더 스와이프 드래그 로직 */
        function startFolderDrag(e, chip) {
            let fStartX = (e.touches ? e.touches[0] : e).clientX;
            let fCurrentX = 0;

            document.onmousemove = document.ontouchmove = me => {
                fCurrentX = ((me.touches ? me.touches[0] : me).clientX) - fStartX;
                chip.style.transform = `translateX(${fCurrentX}px)`;
            };

            document.onmouseup = document.ontouchend = () => {
                document.onmousemove = document.ontouchmove = null;
                if (Math.abs(fCurrentX) > 50) navigateFolder(fCurrentX > 0 ? -1 : 1);
                chip.style.transform = '';
            };
        }

        function navigateFolder(d) {
            const next = currentFolderIdx + d;
            if (next >= 0 && next < folders.length) {
                currentFolderIdx = next;
                currentIndex = 0;
                renderFolders(); renderCards();
            }
        }

        function toggleStoreMode() {
            isStoreMode = !isStoreMode;
            const btn = document.getElementById('storeModeBtn');
            btn.classList.toggle('active', isStoreMode);
            currentIndex = 0;
            showToast(isStoreMode ? "정리 모드: 미분류 카드만 표시됩니다." : "일반 모드");
            renderCards();
        }

        function getFilteredIdeas() {
            let list = isStoreMode ? ideas.filter(i => i.folder === 'uncategorized') : ideas;
            if (!isStoreMode) {
                const f = folders[currentFolderIdx];
                if (f.id === 'favorites') list = ideas.filter(i => i.favorite);
                else if (f.id !== 'all') list = ideas.filter(i => i.folder === f.id);
            }
            if (searchTerm) list = list.filter(i => i.content.toLowerCase().includes(searchTerm.toLowerCase()));
            return list;
        }

        function saveToFolderInStoreMode(idea) {
            const folder = folders[currentFolderIdx];
            if (folder.id === 'all' || folder.id === 'favorites' || folder.id === 'uncategorized') {
                showToast("일반 폴더를 선택해주세요.");
                return;
            }
            idea.folder = folder.id;
            saveData();
            // 화면에서 즉시 사라지게 하기 위해 currentIndex 조정 없이 렌더링
            renderCards();
            showToast(`"${folder.name}" 폴더에 저장되었습니다.`);
        }

        function saveToFolder(idea) {
            const folder = folders[currentFolderIdx];
            if (folder.locked) { showToast("저장 가능한 폴더가 아닙니다."); return; }
            idea.folder = folder.id;
            saveData(); renderCards();
            showToast(`"${folder.name}" 저장 완료`);
        }

        function toggleFavorite(idea) {
            idea.favorite = !idea.favorite;
            const favT = document.getElementById('favToast');
            favT.innerHTML = idea.favorite ? icons.starF : icons.starO;
            favT.classList.add('show');
            setTimeout(() => favT.classList.remove('show'), 800);
            saveData(); renderCards();
        }

        function deleteIdea(idea) {
            lastDeletedIdea = { ...idea, gIdx: ideas.findIndex(i => i.id === idea.id) };
            ideas = ideas.filter(i => i.id !== idea.id);
            saveData(); renderCards();
            const bar = document.getElementById('undoBar');
            bar.classList.add('show');
            if (undoTimeout) clearTimeout(undoTimeout);
            undoTimeout = setTimeout(() => bar.classList.remove('show'), 5000);
        }

        function undoDelete() {
            if (lastDeletedIdea) {
                ideas.splice(lastDeletedIdea.gIdx, 0, lastDeletedIdea);
                lastDeletedIdea = null;
                document.getElementById('undoBar').classList.remove('show');
                saveData(); renderCards();
            }
        }

        function startEdit(id) {
            const idea = ideas.find(i => i.id === id);
            const deck = document.getElementById('cardDeck');
            deck.innerHTML = `<div class="card center editing"><textarea id="editArea">${idea.content}</textarea><button onclick="finishEdit(${id})" class="btn-main" style="background:var(--accent-color); color:white; border:none; padding:15px; border-radius:15px; margin-top:10px; font-weight:700;">수정 완료</button></div>`;
            document.getElementById('editArea').focus();
        }

        function finishEdit(id) {
            const val = document.getElementById('editArea').value.trim();
            if (val) { ideas.find(i => i.id === id).content = val; saveData(); renderCards(); }
        }

        function setupLogoDrag() {
            const logo = document.getElementById('mainLogo');
            logo.draggable = true;
            logo.addEventListener('dragend', () => {
                if (isStoreMode) { showToast("일반 모드에서만 새 카드를 만들 수 있습니다."); return; }
                const n = { id: Date.now(), content: '', folder: 'uncategorized', favorite: false, createdAt: new Date().toISOString() };
                ideas.unshift(n); currentIndex = 0; saveData(); renderCards(); startEdit(n.id);
            });
        }

        function renderPalettes() {
            const fP = document.getElementById('folderPalette');
            fP.innerHTML = allColors.map(c => `<div class="color-dot" style="background:${c}" onclick="setFolderColor('${c}')"></div>`).join('');
            
            const aP = document.getElementById('colorPalette');
            aP.innerHTML = allColors.map(c => `<div class="color-dot" style="background:${c}" onclick="setAccent('${c}')"></div>`).join('');
        }

        function setFolderColor(c) {
            if (selectedFolderToEdit) {
                folders.find(f => f.id === selectedFolderToEdit).color = c;
                saveData(); renderFolderList(); renderFolders(); renderCards();
            }
        }

        function setAccent(c) {
            document.documentElement.style.setProperty('--accent-color', c);
            saveData(); renderFolders();
        }

        function renderFolderList() {
            document.getElementById('folderList').innerHTML = folders.filter(f => !f.locked).map(f => `
                <div style="display:flex; align-items:center; gap:10px; padding:15px; background:var(--bg-color); border-radius:15px; margin-bottom:10px; border:${selectedFolderToEdit===f.id?'2px solid var(--accent-color)':'none'}" onclick="selectedFolderToEdit='${f.id}'; renderFolderList();">
                    <div style="width:15px; height:15px; border-radius:50%; background:${f.color}"></div>
                    <input type="text" value="${f.name}" onchange="updateFolderName('${f.id}', this.value)" style="flex:1; border:none; background:none; outline:none;">
                    <button onclick="deleteFolder('${f.id}')" style="border:none; background:none; color:red;">삭제</button>
                </div>
            `).join('');
        }

        function updateFolderName(id, n) { folders.find(f => f.id === id).name = n; saveData(); renderFolders(); }
        function addNewFolder() { folders.push({ id: 'f'+Date.now(), name: '새 폴더', color: vividColors[0], locked: false }); saveData(); renderFolderList(); renderFolders(); }
        function deleteFolder(id) { if(confirm('삭제할까요?')) { folders = folders.filter(f => f.id !== id); saveData(); renderFolderList(); renderFolders(); } }

        function openMenu() { selectedFolderToEdit = null; renderFolderList(); document.getElementById('overlay').classList.add('show'); document.getElementById('menuModal').classList.add('show'); }
        function openSettings() { document.getElementById('overlay').classList.add('show'); document.getElementById('settingsModal').classList.add('show'); }
        function closeAllModals() { document.querySelectorAll('.modal, .modal-overlay').forEach(el => el.classList.remove('show')); }
        function toggleSearch() { document.getElementById('searchBar').classList.toggle('show'); }
        function onSearch(v) { searchTerm = v; currentIndex = 0; renderCards(); }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); saveData(); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function updateCounter() { const f = getFilteredIdeas(); const c = f.length > 0 ? currentIndex + 1 : 0; document.getElementById('cardCounter').textContent = `${c.toString().padStart(2, '0')} / ${f.length.toString().padStart(2, '0')}`; }
        function navigateCard(d) { const f = getFilteredIdeas(); const n = currentIndex + d; if (n >= 0 && n < f.length) { currentIndex = n; renderCards(); } }

        /* 데이터 내보내기/가져오기 */
        function exportAsText() { let t = ideas.map(i => `[${folders.find(f=>f.id===i.folder)?.name || '미분류'}] ${i.content}`).join('\n'); const b = new Blob([t], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'pongdum.txt'; a.click(); }
        function exportData() { const b = new Blob([JSON.stringify({ideas, folders})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'pongdum_backup.json'; a.click(); }
        function importData() { document.getElementById('importFile').click(); }
        function handleImport(e) { const r = new FileReader(); r.onload = ev => { const d = JSON.parse(ev.target.result); ideas = d.ideas; folders = d.folders; saveData(); location.reload(); }; r.readAsText(e.target.files[0]); }

        init();
    </script>
</body>
</html>
