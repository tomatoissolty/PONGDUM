<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PONGDUM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent: #7C7CFF;
            --bg: #FAFAFA;
            --card-bg: #FFFFFF;
            --text-primary: #2B2B2B;
            --text-secondary: #9E9E9E;
            --border: rgba(0,0,0,0.06);
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 16px 40px rgba(0,0,0,0.12);
            --highlight-bg: rgba(255, 235, 59, 0.4);
        }

        body.dark-mode {
            --bg: #121212;
            --card-bg: #1E1E1E;
            --text-primary: #E8E8E8;
            --text-secondary: #707070;
            --border: rgba(255,255,255,0.08);
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.6);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.8);
            --highlight-bg: rgba(255, 235, 59, 0.3);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            width: 100%;
            height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: max(env(safe-area-inset-top), 16px) 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: var(--bg);
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-btn:active {
            transform: scale(0.9);
            background: var(--border);
        }

        .header-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
        }

        .logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            cursor: grab;
            padding: 12px 0;
            user-select: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo:active {
            cursor: grabbing;
        }

        .logo.dragging {
            color: var(--accent);
            transform: translateX(-50%) scale(0.95);
        }

        /* Search */
        .search-container {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 70px);
            left: 20px;
            right: 20px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
        }

        .search-container.show {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            box-shadow: var(--shadow-md);
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: var(--shadow-lg), 0 0 0 4px rgba(124, 124, 255, 0.1);
        }

        /* Deck Container */
        .deck-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(304px, calc((100vw - 40px) * 0.8));
            height: min(416px, calc((100vh - 280px) * 0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -20px;
        }

        .card-deck {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Card */
        .card {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow-lg);
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: grab;
            touch-action: none;
            will-change: transform, opacity;
            --drag-x: 0px;
            --drag-y: 0px;
        }

        body.dark-mode .card {
            border: 1px solid rgba(255,255,255,0.08);
        }

        .card:active {
            cursor: grabbing;
        }

        .card.center {
            z-index: 10;
            transform: translate(var(--drag-x), var(--drag-y)) rotate(calc(var(--drag-x) * 0.02deg));
            opacity: 1;
            filter: blur(0);
        }

        .card.left-1 {
            z-index: 9;
            transform: translateX(-35px) scale(0.94) rotateY(5deg);
            opacity: 0.5;
            filter: blur(1px) brightness(0.8);
        }

        .card.left-2 {
            z-index: 8;
            transform: translateX(-60px) scale(0.88) rotateY(8deg);
            opacity: 0.25;
            filter: blur(2px) brightness(0.7);
        }

        .card.right-1 {
            z-index: 9;
            transform: translateX(35px) scale(0.94) rotateY(-5deg);
            opacity: 0.5;
            filter: blur(1px) brightness(0.8);
        }

        .card.right-2 {
            z-index: 8;
            transform: translateX(60px) scale(0.88) rotateY(-8deg);
            opacity: 0.25;
            filter: blur(2px) brightness(0.7);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-indicators {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .folder-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .fav-star {
            font-size: 16px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fav-star svg {
            width: 16px;
            height: 16px;
            fill: #FFD60A;
            stroke: none;
        }

        .edit-trigger {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin: -8px -8px 0 0;
        }

        .edit-trigger:active {
            transform: scale(0.9);
            background: var(--border);
        }

        .edit-trigger svg {
            width: 18px;
            height: 18px;
        }

        .card-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 15px;
            line-height: 1.8;
            font-weight: 500;
            color: var(--text-primary);
            word-break: keep-all;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .card-content::-webkit-scrollbar {
            display: none;
        }

        .highlight {
            background: var(--highlight-bg);
            padding: 2px 0;
            border-radius: 3px;
        }

        .card.editing textarea {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            font-size: 15px;
            line-height: 1.8;
            text-align: center;
            outline: none;
            resize: none;
            color: var(--text-primary);
            font-family: inherit;
            font-weight: 500;
        }

        .card-time {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 16px;
            font-weight: 500;
        }

        .edit-btn-container {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-done {
            padding: 12px 32px;
            border-radius: 16px;
            border: none;
            background: var(--accent);
            color: rgba(0,0,0,0.85);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-done:active {
            transform: scale(0.95);
            box-shadow: var(--shadow-sm);
        }

        /* Counter */
        .card-counter {
            position: fixed;
            top: calc(50% + min(208px, calc((100vh - 280px) * 0.8 / 2)) + 30px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .card-counter .current {
            color: var(--accent);
        }

        /* Swipe Hint */
        .swipe-hint {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 110px);
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 5;
        }

        .swipe-hint.show {
            opacity: 1;
            animation: subtlePulse 2s ease-in-out infinite;
        }

        @keyframes subtlePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Folder Section */
        .folder-section {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 20px);
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .f-btn {
            width: 52px;
            height: 52px;
            background: var(--card-bg);
            border: none;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        body.dark-mode .f-btn {
            border: 1px solid rgba(255,255,255,0.08);
        }

        .f-btn:active {
            transform: scale(0.9);
        }

        .f-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: var(--shadow-md), 0 0 0 4px rgba(124, 124, 255, 0.2);
        }

        .f-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
        }

        .folder-slider-wrap {
            flex: 1;
            height: 70px;
            position: relative;
            overflow: hidden;
        }

        .folder-deck {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .folder-chip {
            position: absolute;
            padding: 14px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            cursor: grab;
            border: 2px solid transparent;
        }

        body.dark-mode .folder-chip {
            border: 1px solid rgba(255,255,255,0.08);
        }

        .folder-chip:active {
            cursor: grabbing;
        }

        .folder-chip.center {
            z-index: 5;
            background: var(--card-bg);
            border-color: var(--accent);
            color: var(--text-primary);
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .folder-chip.side {
            z-index: 4;
            opacity: 0.4;
            filter: blur(0.5px);
        }

        .folder-chip.left-1 {
            transform: translateX(-70px) scale(0.88);
        }

        .folder-chip.right-1 {
            transform: translateX(70px) scale(0.88);
        }

        .folder-chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Toasts & Indicators */
        .toast {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 80px);
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .fav-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 100px;
            height: 100px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 15;
            box-shadow: var(--shadow-lg);
        }

        body.dark-mode .fav-toast {
            background: rgba(30, 30, 30, 0.95);
        }

        .fav-toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .fav-toast svg {
            width: 44px;
            height: 44px;
            fill: #FFD60A;
            stroke: none;
        }

        .undo-bar {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 100px);
            left: 20px;
            right: 20px;
            max-width: 460px;
            margin: 0 auto;
            background: var(--card-bg);
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 4000;
            box-shadow: var(--shadow-lg);
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .undo-bar.show {
            transform: translateY(0);
            opacity: 1;
        }

        .undo-bar span:first-child {
            font-size: 14px;
            font-weight: 600;
        }

        .undo-bar span:last-child {
            color: var(--accent);
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            padding: 8px 12px;
            margin: -8px -12px -8px 0;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .undo-bar span:last-child:active {
            background: var(--border);
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 400;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: 28px 28px 0 0;
            padding: 32px 24px calc(env(safe-area-inset-bottom) + 24px);
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 500;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal.show {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .color-dot {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .color-dot:active {
            transform: scale(0.9);
        }

        .color-dot.selected {
            border-color: var(--text-primary);
            transform: scale(1.1);
            box-shadow: 0 0 0 2px var(--card-bg), 0 0 0 5px var(--text-primary);
        }

        /* Stats Section */
        .stats-section {
            background: var(--bg);
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 3px;
            font-weight: 600;
        }

        .folder-stats {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .folder-stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 12px;
        }

        .folder-stat-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .folder-stat-count {
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Settings Buttons Grid */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .settings-btn {
            height: 70px;
            border: none;
            background: var(--bg);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
        }

        .settings-btn:active {
            transform: scale(0.95);
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-primary);
            stroke-width: 2;
        }

        .settings-btn-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            background: var(--accent);
            color: white;
            margin-bottom: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .folder-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg);
            border-radius: 16px;
            margin-bottom: 10px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .folder-item.selected {
            border-color: var(--accent);
            background: rgba(124, 124, 255, 0.05);
        }

        .folder-item input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            color: var(--text-primary);
        }

        .folder-color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .folder-color-btn:active {
            transform: scale(0.9);
        }

        .delete-icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: #FF6B6B;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .delete-icon-btn:active {
            background: rgba(255, 107, 107, 0.1);
            transform: scale(0.9);
        }

        .delete-icon-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
        }

        /* Empty State */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            white-space: pre-line;
        }

        /* Card Creation Animation */
        .card.creating {
            animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardPop {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 380px) {
            .card {
                border-radius: 24px;
                padding: 28px 24px;
            }
            
            .folder-chip {
                font-size: 12px;
                padding: 12px 16px;
            }
            
            .f-btn {
                width: 48px;
                height: 48px;
            }
        }

        @media (min-width: 768px) {
            .deck-container {
                width: 336px;
                height: 464px;
            }
        }

        @media (min-height: 800px) {
            .deck-container {
                height: min(480px, calc((100vh - 300px) * 0.8));
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <header class="header">
        <button class="header-btn" onclick="toggleSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
        <div class="logo" id="mainLogo">PONGDUM</div>
        <button class="header-btn" onclick="openSettings()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
            </svg>
        </button>
        <div class="search-container" id="searchBar">
            <input type="text" class="search-input" placeholder="검색..." oninput="onSearch(this.value)">
        </div>
    </header>

    <main class="deck-container">
        <div class="card-deck" id="cardDeck">
            <div class="fav-toast" id="favToast"></div>
        </div>
    </main>
    
    <div class="card-counter" id="cardCounter"><span class="current">00</span> / 00</div>
    <div class="swipe-hint" id="swipeHint">← 스와이프하여 탐색 →</div>

    <div class="toast" id="toast"></div>
    <div class="undo-bar" id="undoBar">
        <span>삭제되었습니다</span>
        <span onclick="undoDelete()">복구</span>
    </div>

    <div class="folder-section">
        <button class="f-btn" onclick="openMenu()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="folder-slider-wrap">
            <div class="folder-deck" id="folderDeck"></div>
        </div>
        <button class="f-btn" id="storeModeBtn" onclick="toggleStoreMode()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"></path>
                <line x1="12" y1="11" x2="12" y2="17"></line>
                <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
        </button>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeAllModals()"></div>
    
    <div class="modal" id="menuModal">
        <div class="modal-header">
            <div class="modal-title">폴더 관리</div>
        </div>
        <div id="folderList"></div>
        <button onclick="addNewFolder()" class="btn-main btn-secondary">+ 새 폴더</button>
        <div id="folderPalette" class="palette-grid"></div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-header">
            <div class="modal-title">설정</div>
        </div>
        
        <!-- 통계 섹션 -->
        <div class="stats-section">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">전체</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statFav">0</div>
                    <div class="stat-label">즐겨찾기</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statFolders">0</div>
                    <div class="stat-label">폴더</div>
                </div>
            </div>
            <div class="folder-stats" id="folderStats"></div>
        </div>

        <div id="colorPalette" class="palette-grid"></div>
        
        <div class="settings-grid">
            <button class="settings-btn" onclick="toggleDarkMode()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <span class="settings-btn-label">다크모드</span>
            </button>
            
            <button class="settings-btn" onclick="exportAsText()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span class="settings-btn-label">텍스트 저장</span>
            </button>
            
            <button class="settings-btn" onclick="exportData()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span class="settings-btn-label">내보내기</span>
            </button>
            
            <button class="settings-btn" onclick="importData()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span class="settings-btn-label">가져오기</span>
            </button>
        </div>
        
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImport(event)">
    </div>

    <script>
        let ideas = [];
        let folders = [
            { id: 'all', name: '전체', color: '#7C7CFF', locked: true },
            { id: 'favorites', name: '즐겨찾기', color: '#FFD60A', locked: true },
            { id: 'uncategorized', name: '미분류', color: '#9E9E9E', locked: false }
        ];
        let currentIndex = 0;
        let currentFolderIdx = 0;
        let isStoreMode = false;
        let isDragging = false;
        let startX, startY;
        let searchTerm = "";
        let selectedFolderToEdit = null;
        let lastDeletedIdea = null;
        let undoTimeout = null;

        const vividColors = ['#FF3B30', '#FF9500', '#34C759', '#007AFF', '#AF52DE'];
        const pastelColors = ['#FFB3BA', '#BAFFC9', '#BAE1FF', '#FFFFBA', '#E0BBE4'];
        const gradientColors = ['#FF6B9D', '#C471ED', '#12D8FA', '#F093FB', '#4FACFE'];
        const allColors = [...vividColors, ...pastelColors, ...gradientColors];

        const icons = {
            starFilled: `<svg viewBox="0 0 24 24" fill="#FFD60A" stroke="none"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`,
            starOutline: `<svg viewBox="0 0 24 24" fill="none" stroke="#9E9E9E" stroke-width="2"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`,
            edit: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
            trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`
        };

        function init() {
            loadData();
            renderFolders();
            renderCards();
            renderPalettes();
            setupLogoAction();
            setupSearchKeyboard();
            updateStats();
            showSwipeHintOnFirstRun();
        }

        function showSwipeHintOnFirstRun() {
            const hasSeenHint = localStorage.getItem('pongdum_hint_seen');
            if (!hasSeenHint && ideas.length > 0) {
                const hint = document.getElementById('swipeHint');
                hint.classList.add('show');
                setTimeout(() => {
                    hint.classList.remove('show');
                    localStorage.setItem('pongdum_hint_seen', 'true');
                }, 3000);
            }
        }

        function loadData() {
            ideas = JSON.parse(localStorage.getItem('pongdum_ideas') || '[]');
            const savedF = localStorage.getItem('pongdum_folders');
            if (savedF) folders = JSON.parse(savedF);
            if (localStorage.getItem('pongdum_dark') === 'true') document.body.classList.add('dark-mode');
            const acc = localStorage.getItem('pongdum_accent') || '#7C7CFF';
            document.documentElement.style.setProperty('--accent', acc);
        }

        function saveData() {
            localStorage.setItem('pongdum_ideas', JSON.stringify(ideas));
            localStorage.setItem('pongdum_folders', JSON.stringify(folders));
            localStorage.setItem('pongdum_dark', document.body.classList.contains('dark-mode'));
            localStorage.setItem('pongdum_accent', document.documentElement.style.getPropertyValue('--accent'));
        }

        function renderCards() {
            const deck = document.getElementById('cardDeck');
            const filtered = getFilteredIdeas();
            
            // favToast 보존
            let favToast = deck.querySelector('#favToast');
            if (!favToast) {
                favToast = document.createElement('div');
                favToast.className = 'fav-toast';
                favToast.id = 'favToast';
            }
            
            deck.innerHTML = '';
            deck.appendChild(favToast);
            
            if (filtered.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.textContent = isStoreMode ? '분류할 카드가 없습니다' : 'PONGDUM을 아래로 드래그하여\n첫 아이디어를 추가하세요';
                deck.appendChild(empty);
            } else {
                const offsets = [-2, -1, 0, 1, 2];
                offsets.forEach(off => {
                    const idx = (currentIndex + off + filtered.length) % filtered.length;
                    if (filtered.length > 0) {
                        deck.appendChild(createCard(filtered[idx], off));
                    }
                });
            }
            
            updateCounter();
        }

        function createCard(idea, offset) {
            const card = document.createElement('div');
            const classMap = { "-2": "left-2", "-1": "left-1", "0": "center", "1": "right-1", "2": "right-2" };
            card.className = `card ${classMap[offset]} fade-in`;
            card.dataset.ideaId = idea.id;
            
            const f = folders.find(f => f.id === idea.folder);
            const dotColor = f ? f.color : '#9E9E9E';
            const date = new Date(idea.createdAt);
            
            let contentHTML = idea.content;
            if (searchTerm && offset === 0) {
                const regex = new RegExp(`(${searchTerm})`, 'gi');
                contentHTML = contentHTML.replace(regex, '<span class="highlight">$1</span>');
            }
            
            card.innerHTML = `
                <div class="card-top">
                    <div class="card-indicators">
                        <div class="folder-dot" style="background:${dotColor}; display:${idea.folder==='uncategorized'?'none':'block'}"></div>
                        ${idea.favorite ? `<span class="fav-star">${icons.starFilled}</span>` : ''}
                    </div>
                    <button class="edit-trigger" onclick="event.stopPropagation(); startEdit(${idea.id});">
                        ${icons.edit}
                    </button>
                </div>
                <div class="card-content">${contentHTML}</div>
                <div class="card-time">${date.getMonth()+1}월 ${date.getDate()}일</div>
            `;
            
            if (offset === 0) {
                card.onmousedown = card.ontouchstart = e => startDrag(e, card, idea);
            }
            
            return card;
        }

        function renderFolders() {
            const deck = document.getElementById('folderDeck');
            deck.innerHTML = '';
            
            const displayFolders = isStoreMode 
                ? folders.filter(f => !f.locked && f.id !== 'uncategorized')
                : folders;

            if (currentFolderIdx >= displayFolders.length) currentFolderIdx = 0;

            const offsets = [-1, 0, 1];
            offsets.forEach(off => {
                const idx = currentFolderIdx + off;
                if (idx >= 0 && idx < displayFolders.length) {
                    const f = displayFolders[idx];
                    const chip = document.createElement('div');
                    chip.className = `folder-chip ${off === 0 ? 'center' : 'side'} ${off < 0 ? 'left-1' : (off > 0 ? 'right-1' : '')}`;
                    chip.innerHTML = `<span class="folder-chip-dot" style="background:${f.color}"></span>${f.name}`;
                    
                    if (off === 0) {
                        chip.onmousedown = chip.ontouchstart = e => startFolderDrag(e, chip, displayFolders.length);
                    }
                    
                    deck.appendChild(chip);
                }
            });
        }

        function startDrag(e, card, idea) {
            if (e.target.closest('.edit-trigger')) return;
            
            isDragging = true;
            const pt = e.touches ? e.touches[0] : e;
            startX = pt.clientX;
            startY = pt.clientY;

            const handleMove = me => {
                if (!isDragging) return;
                me.preventDefault();
                
                const mpt = me.touches ? me.touches[0] : me;
                const dragX = mpt.clientX - startX;
                const dragY = mpt.clientY - startY;
                
                card.style.setProperty('--drag-x', `${dragX}px`);
                card.style.setProperty('--drag-y', `${dragY}px`);
                
                const t = document.getElementById('toast');
                if (Math.abs(dragY) > 80) {
                    const displayFolders = isStoreMode 
                        ? folders.filter(f => !f.locked && f.id !== 'uncategorized') 
                        : folders;
                    const f = displayFolders[currentFolderIdx];
                    t.textContent = dragY < 0 
                        ? '🗑️ 삭제' 
                        : (isStoreMode ? `💾 ${f.name}에 저장` : (!folders[currentFolderIdx].locked ? '↩️ 미분류' : '💾 저장'));
                    t.classList.add('show');
                } else {
                    t.classList.remove('show');
                }
            };

            const handleEnd = () => {
                document.removeEventListener('mousemove', handleMove);
                document.removeEventListener('mouseup', handleEnd);
                document.removeEventListener('touchmove', handleMove);
                document.removeEventListener('touchend', handleEnd);
                
                document.getElementById('toast').classList.remove('show');
                
                const dragX = parseFloat(card.style.getPropertyValue('--drag-x')) || 0;
                const dragY = parseFloat(card.style.getPropertyValue('--drag-y')) || 0;
                
                const isDragSmall = Math.abs(dragX) < 10 && Math.abs(dragY) < 10;
                
                if (isDragSmall) {
                    toggleFavorite(idea);
                } else {
                    if (Math.abs(dragX) > 120) {
                        navigateCard(dragX > 0 ? -1 : 1);
                    } else if (dragY < -100) {
                        deleteIdea(idea);
                    } else if (dragY > 100) {
                        const displayFolders = isStoreMode 
                            ? folders.filter(f => !f.locked && f.id !== 'uncategorized') 
                            : folders;
                        const f = displayFolders[currentFolderIdx];
                        
                        if (isStoreMode) {
                            saveInStoreMode(idea, f);
                        } else if (!folders[currentFolderIdx].locked) {
                            unclassifyIdea(idea);
                        } else {
                            saveIdea(idea);
                        }
                    }
                }
                
                card.style.setProperty('--drag-x', '0px');
                card.style.setProperty('--drag-y', '0px');
                isDragging = false;
            };

            document.addEventListener('mousemove', handleMove);
            document.addEventListener('mouseup', handleEnd);
            document.addEventListener('touchmove', handleMove, { passive: false });
            document.addEventListener('touchend', handleEnd);
        }

        function startFolderDrag(e, chip, totalCount) {
            let fStartX = (e.touches ? e.touches[0] : e).clientX;
            let fCurrentX = 0;

            const handleMove = me => {
                fCurrentX = ((me.touches ? me.touches[0] : me).clientX) - fStartX;
                chip.style.transition = 'none';
                chip.style.transform = `translateX(${fCurrentX}px)`;
            };

            const handleEnd = () => {
                document.removeEventListener('mousemove', handleMove);
                document.removeEventListener('mouseup', handleEnd);
                document.removeEventListener('touchmove', handleMove);
                document.removeEventListener('touchend', handleEnd);
                
                if (Math.abs(fCurrentX) > 40) {
                    navigateFolder(fCurrentX > 0 ? -1 : 1, totalCount);
                }
                chip.style.transition = '';
                chip.style.transform = '';
            };

            document.addEventListener('mousemove', handleMove);
            document.addEventListener('mouseup', handleEnd);
            document.addEventListener('touchmove', handleMove);
            document.addEventListener('touchend', handleEnd);
        }

        function navigateFolder(d, totalCount) {
            const next = currentFolderIdx + d;
            if (next >= 0 && next < totalCount) {
                currentFolderIdx = next;
                currentIndex = 0;
                renderFolders();
                renderCards();
            }
        }

        function navigateCard(d) {
            const f = getFilteredIdeas();
            if (f.length === 0) return;
            
            const newIndex = (currentIndex + d + f.length) % f.length;
            currentIndex = newIndex;
            renderCards();
        }

        function toggleStoreMode() {
            isStoreMode = !isStoreMode;
            document.getElementById('storeModeBtn').classList.toggle('active', isStoreMode);
            currentFolderIdx = 0;
            currentIndex = 0;
            renderFolders();
            renderCards();
            showToast(isStoreMode ? "정리 모드" : "일반 모드");
        }

        function saveInStoreMode(idea, targetFolder) {
            if (targetFolder) {
                idea.folder = targetFolder.id;
                saveData();
                renderCards();
                showToast(`${targetFolder.name}에 저장됨`);
            }
        }

        function saveIdea(idea) {
            const f = folders[currentFolderIdx];
            if (f.locked) return;
            idea.folder = f.id;
            saveData();
            renderCards();
            showToast(`${f.name}에 저장됨`);
        }

        function unclassifyIdea(idea) {
            idea.folder = 'uncategorized';
            saveData();
            renderCards();
            showToast("미분류로 이동");
        }

        function toggleFavorite(idea) {
            idea.favorite = !idea.favorite;
            saveData();
            
            // 즐겨찾기 토스트 표시
            const favT = document.getElementById('favToast');
            favT.innerHTML = idea.favorite ? icons.starFilled : icons.starOutline;
            favT.classList.add('show');
            setTimeout(() => favT.classList.remove('show'), 600);
            
            // 카드 다시 렌더링
            renderCards();
            updateStats();
        }

        function deleteIdea(idea) {
            lastDeletedIdea = { ...idea, gIdx: ideas.findIndex(i => i.id === idea.id) };
            ideas = ideas.filter(i => i.id !== idea.id);
            saveData();
            renderCards();
            updateStats();
            
            const bar = document.getElementById('undoBar');
            bar.classList.add('show');
            
            if (undoTimeout) clearTimeout(undoTimeout);
            undoTimeout = setTimeout(() => {
                bar.classList.remove('show');
            }, 3000);
        }

        function undoDelete() {
            if (lastDeletedIdea) {
                ideas.splice(lastDeletedIdea.gIdx, 0, lastDeletedIdea);
                lastDeletedIdea = null;
                if (undoTimeout) clearTimeout(undoTimeout);
                document.getElementById('undoBar').classList.remove('show');
                saveData();
                renderCards();
                updateStats();
            }
        }

        function startEdit(id) {
            const idea = ideas.find(i => i.id === id);
            if (!idea) return;
            
            const deck = document.getElementById('cardDeck');
            
            // favToast 보존
            let favToast = deck.querySelector('#favToast');
            if (!favToast) {
                favToast = document.createElement('div');
                favToast.className = 'fav-toast';
                favToast.id = 'favToast';
            }
            
            deck.innerHTML = `
                <div class="card center editing">
                    <textarea id="editArea" placeholder="아이디어를 입력하세요...">${idea.content}</textarea>
                    <div class="edit-btn-container">
                        <button onclick="finishEdit(${id})" class="btn-done">완료</button>
                    </div>
                </div>
            `;
            
            deck.appendChild(favToast);
            
            setTimeout(() => {
                const area = document.getElementById('editArea');
                if (area) area.focus();
            }, 100);
        }

        function finishEdit(id) {
            const val = document.getElementById('editArea').value.trim();
            if (val) {
                const idea = ideas.find(i => i.id === id);
                idea.content = val;
                saveData();
            }
            renderCards();
        }

        function setupLogoAction() {
            const logo = document.getElementById('mainLogo');
            let lStartX, lStartY, isLogoActive = false;
            const maxDragY = window.innerHeight / 2 - 34 - (416 * 0.8 / 2) - 60;

            logo.onmousedown = logo.ontouchstart = (e) => {
                const pt = e.touches ? e.touches[0] : e;
                lStartX = pt.clientX;
                lStartY = pt.clientY;
                isLogoActive = true;
            };

            const handleMove = (e) => {
                if (!isLogoActive) return;
                const pt = e.touches ? e.touches[0] : e;
                const diffY = pt.clientY - lStartY;
                
                if (diffY > 0) {
                    const clampedY = Math.min(diffY * 0.3, maxDragY);
                    logo.style.transform = `translateX(-50%) translateY(${clampedY}px)`;
                    logo.classList.add('dragging');
                }
            };

            const handleEnd = (e) => {
                if (!isLogoActive) return;
                const pt = e.changedTouches ? e.changedTouches[0] : e;
                const diffY = pt.clientY - lStartY;
                
                logo.style.transform = 'translateX(-50%)';
                logo.classList.remove('dragging');
                
                if (diffY > 60) {
                    createNewCard();
                } else if (Math.abs(diffY) < 10) {
                    currentFolderIdx = 0;
                    currentIndex = 0;
                    renderFolders();
                    renderCards();
                }
                
                isLogoActive = false;
            };

            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            window.addEventListener('touchend', handleEnd);
        }

        function createNewCard() {
            const displayFolders = isStoreMode 
                ? folders.filter(f => !f.locked && f.id !== 'uncategorized') 
                : folders;
            const currentF = displayFolders[currentFolderIdx];
            const initF = (!currentF.locked) ? currentF.id : 'uncategorized';
            
            const n = {
                id: Date.now(),
                content: '',
                folder: initF,
                favorite: false,
                createdAt: new Date().toISOString()
            };
            ideas.unshift(n);
            currentIndex = 0;
            saveData();
            
            setTimeout(() => startEdit(n.id), 100);
        }

        function renderPalettes() {
            const currentAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
            
            document.getElementById('folderPalette').innerHTML = allColors.map(c => 
                `<div class="color-dot" style="background:${c}" onclick="setFolderColor('${c}')"></div>`
            ).join('');
            
            document.getElementById('colorPalette').innerHTML = allColors.map(c => 
                `<div class="color-dot ${c === currentAccent ? 'selected' : ''}" style="background:${c}" onclick="setAccent('${c}')"></div>`
            ).join('');
        }

        function setFolderColor(c) {
            if (selectedFolderToEdit) {
                const folder = folders.find(f => f.id === selectedFolderToEdit);
                if (folder) {
                    folder.color = c;
                    saveData();
                    renderFolderList();
                    renderFolders();
                    renderCards();
                }
            } else {
                showToast("폴더를 먼저 선택하세요");
            }
        }

        function setAccent(c) {
            document.documentElement.style.setProperty('--accent', c);
            saveData();
            renderFolders();
            renderPalettes();
        }

        function renderFolderList() {
            document.getElementById('folderList').innerHTML = folders.filter(f => !f.locked).map(f => `
                <div class="folder-item ${selectedFolderToEdit===f.id?'selected':''}" onclick="selectedFolderToEdit='${f.id}'; renderFolderList();">
                    <div class="folder-color-btn" style="background:${f.color}"></div>
                    <input type="text" value="${f.name}" onchange="updateFolderName('${f.id}', this.value)" onclick="event.stopPropagation();">
                    ${f.id !== 'uncategorized' ? `<button class="delete-icon-btn" onclick="event.stopPropagation(); deleteFolder('${f.id}')">${icons.trash}</button>` : ''}
                </div>
            `).join('');
        }

        function updateFolderName(id, n) {
            folders.find(f => f.id === id).name = n;
            saveData();
            renderFolders();
        }

        function addNewFolder() {
            folders.push({
                id: 'f' + Date.now(),
                name: '새 폴더',
                color: allColors[Math.floor(Math.random() * allColors.length)],
                locked: false
            });
            saveData();
            renderFolderList();
            renderFolders();
            updateStats();
        }

        function deleteFolder(id) {
            if (confirm('폴더를 삭제하시겠습니까?')) {
                ideas.forEach(i => {
                    if (i.folder === id) i.folder = 'uncategorized';
                });
                folders = folders.filter(f => f.id !== id);
                
                const displayFolders = isStoreMode 
                    ? folders.filter(f => !f.locked && f.id !== 'uncategorized')
                    : folders;
                
                if (currentFolderIdx >= displayFolders.length) {
                    currentFolderIdx = Math.max(0, displayFolders.length - 1);
                }
                
                saveData();
                renderFolderList();
                renderFolders();
                renderCards();
                updateStats();
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = ideas.length;
            document.getElementById('statFav').textContent = ideas.filter(i => i.favorite).length;
            document.getElementById('statFolders').textContent = folders.filter(f => !f.locked).length;
            
            const folderStats = document.getElementById('folderStats');
            folderStats.innerHTML = folders.filter(f => !f.locked).map(f => {
                const count = ideas.filter(i => i.folder === f.id).length;
                return `
                    <div class="folder-stat-item">
                        <div class="folder-stat-name">
                            <span class="folder-chip-dot" style="background:${f.color}"></span>
                            <span>${f.name}</span>
                        </div>
                        <span class="folder-stat-count">${count}개</span>
                    </div>
                `;
            }).join('');
        }

        function openMenu() {
            selectedFolderToEdit = null;
            renderFolderList();
            document.getElementById('overlay').classList.add('show');
            document.getElementById('menuModal').classList.add('show');
        }

        function openSettings() {
            updateStats();
            document.getElementById('overlay').classList.add('show');
            document.getElementById('settingsModal').classList.add('show');
        }

        function closeAllModals() {
            document.querySelectorAll('.modal, .modal-overlay').forEach(el => el.classList.remove('show'));
        }

        function toggleSearch() {
            const searchBar = document.getElementById('searchBar');
            const isShowing = searchBar.classList.toggle('show');
            
            if (isShowing) {
                setTimeout(() => {
                    const input = searchBar.querySelector('.search-input');
                    input.focus();
                }, 100);
            }
        }

        function setupSearchKeyboard() {
            document.addEventListener('keydown', (e) => {
                const searchBar = document.getElementById('searchBar');
                if (e.key === 'Escape' && searchBar.classList.contains('show')) {
                    searchBar.classList.remove('show');
                    searchBar.querySelector('.search-input').value = '';
                    onSearch('');
                }
            });
        }

        function onSearch(v) {
            searchTerm = v;
            currentIndex = 0;
            renderCards();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            saveData();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function updateCounter() {
            const f = getFilteredIdeas();
            const c = f.length > 0 ? currentIndex + 1 : 0;
            const counter = document.getElementById('cardCounter');
            counter.innerHTML = `<span class="current">${c.toString().padStart(2, '0')}</span> / ${f.length.toString().padStart(2, '0')}`;
        }

        function getFilteredIdeas() {
            let list = isStoreMode ? ideas.filter(i => i.folder === 'uncategorized') : ideas;
            
            if (!isStoreMode) {
                const f = folders[currentFolderIdx];
                if (f.id === 'favorites') {
                    list = ideas.filter(i => i.favorite);
                } else if (f.id !== 'all') {
                    list = ideas.filter(i => i.folder === f.id);
                }
            }
            
            if (searchTerm) {
                list = list.filter(i => i.content.toLowerCase().includes(searchTerm.toLowerCase()));
            }
            
            return list;
        }

        function exportAsText() {
            const text = ideas.map(i => {
                const folderName = folders.find(f => f.id === i.folder)?.name || '미분류';
                return `[${folderName}] ${i.content}`;
            }).join('\n\n');
            
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'pongdum.txt';
            a.click();
            showToast('텍스트 파일로 저장됨');
        }

        function exportData() {
            const data = JSON.stringify({ ideas, folders }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `pongdum_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast('데이터 내보내기 완료');
        }

        function importData() {
            document.getElementById('importFile').click();
        }

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const d = JSON.parse(ev.target.result);
                    if (confirm('현재 데이터를 덮어쓰시겠습니까?')) {
                        ideas = d.ideas || [];
                        folders = d.folders || folders;
                        saveData();
                        currentIndex = 0;
                        currentFolderIdx = 0;
                        renderFolders();
                        renderCards();
                        updateStats();
                        showToast('데이터 가져오기 완료');
                        closeAllModals();
                    }
                } catch {
                    showToast('잘못된 파일입니다');
                }
            };
            reader.readAsText(file);
        }

        init();
    </script>
</body>
</html>
